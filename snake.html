<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fancy Snake Game</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-container {
      text-align: center;
      color: #fff;
    }

    h1 {
      margin-bottom: 20px;
    }

    .score-board {
      display: flex;
      justify-content: space-around;
      margin-bottom: 10px;
      font-size: 1.2rem;
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(20, 20px);
      grid-template-rows: repeat(20, 20px);
      gap: 1px;
      background-color: #000;
      margin: 0 auto 20px;
    }

    .cell {
      width: 20px;
      height: 20px;
      background-color: #111;
    }

    .snake {
      background-color: #0f0;
    }

    .snake-head {
      background-color: lime;
    }

    .food {
      background-color: red;
    }

    #startBtn {
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #ff5722;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: #fff;
    }

    #startBtn:hover {
      background-color: #e64a19;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🐍 Fancy Snake Game</h1>
    <div class="score-board">
      <span>Score: <span id="score">0</span></span>
      <span>High Score: <span id="highScore">0</span></span>
    </div>
    <div class="game-board" id="gameBoard"></div>
    <button id="startBtn">Start Game</button>
    <audio id="eatSound" src="assets/eat.mp3"></audio>
    <audio id="gameOverSound" src="assets/gameover.mp3"></audio>
    <audio id="bgMusic" src="assets/bg.mp3" autoplay loop></audio>
  </div>

  <script>
    const board = document.getElementById('gameBoard');
    const scoreDisplay = document.getElementById('score');
    const highScoreDisplay = document.getElementById('highScore');
    const startBtn = document.getElementById('startBtn');

    const eatSound = document.getElementById("eatSound");
    const gameOverSound = document.getElementById("gameOverSound");
    const bgMusic = document.getElementById("bgMusic");

    function playEatSound() {
      eatSound.currentTime = 0;
      eatSound.play();
    }

    function playGameOverSound() {
      gameOverSound.currentTime = 0;
      gameOverSound.play();
      bgMusic.pause();
    }

    window.addEventListener("click", () => {
      bgMusic.play().catch(e => console.log("Autoplay blocked"));
    }, { once: true });

    const boardSize = 20;
    let snake = [];
    let direction = { x: 0, y: 0 };
    let food = {};
    let score = 0;
    let highScore = 0;
    let gameInterval;

    function createBoard() {
      board.innerHTML = '';
      for (let i = 0; i < boardSize * boardSize; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        board.appendChild(cell);
      }
    }

    function drawSnake() {
      board.querySelectorAll('.cell').forEach(cell => cell.classList.remove('snake', 'snake-head'));
      snake.forEach((segment, index) => {
        const cell = board.children[segment.y * boardSize + segment.x];
        cell.classList.add('snake');
        if (index === 0) cell.classList.add('snake-head');
      });
    }

    function drawFood() {
      board.querySelectorAll('.cell').forEach(cell => cell.classList.remove('food'));
      const cell = board.children[food.y * boardSize + food.x];
      cell.classList.add('food');
    }

    function placeFood() {
      food = {
        x: Math.floor(Math.random() * boardSize),
        y: Math.floor(Math.random() * boardSize),
      };

      if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
        placeFood();
      } else {
        drawFood();
      }
    }

    function moveSnake() {
      const newHead = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y,
      };

      if (
        newHead.x < 0 || newHead.x >= boardSize ||
        newHead.y < 0 || newHead.y >= boardSize ||
        snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)
      ) {
        endGame();
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        scoreDisplay.textContent = score;
        playEatSound();
        if (score > highScore) {
          highScore = score;
          highScoreDisplay.textContent = highScore;
        }
        placeFood();
      } else {
        snake.pop();
      }

      drawSnake();
    }

    function endGame() {
      clearInterval(gameInterval);
      playGameOverSound();
      alert("Game Over! 🐍");
    }

    function gameLoop() {
      moveSnake();
    }

    function startGame() {
      clearInterval(gameInterval);
      createBoard();
      snake = [{ x: 10, y: 10 }];
      direction = { x: 1, y: 0 };
      score = 0;
      scoreDisplay.textContent = score;
      drawSnake();
      placeFood();
      bgMusic.play();
      gameInterval = setInterval(gameLoop, 200);
    }

    function changeDirection(event) {
      switch (event.key) {
        case 'ArrowUp':
          if (direction.y === 0) direction = { x: 0, y: -1 };
          break;
        case 'ArrowDown':
          if (direction.y === 0) direction = { x: 0, y: 1 };
          break;
        case 'ArrowLeft':
          if (direction.x === 0) direction = { x: -1, y: 0 };
          break;
        case 'ArrowRight':
          if (direction.x === 0) direction = { x: 1, y: 0 };
          break;
      }
    }

    startBtn.addEventListener('click', startGame);
    window.addEventListener('keydown', changeDirection);
    
    
  </script>
  
</body>
</html>
