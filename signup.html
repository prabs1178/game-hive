<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Game Hive</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="emoji-container"></div> <!-- Floating icons -->

  <div class="container">
    <div class="logo-container">
      <img src="assets/gamehive3.jpg" alt="Game Hive Logo" class="logo" />
    </div>
    <h2>Join GameHive Today!</h2>

    <form id="signupForm">
      <input type="text" id="username" placeholder="Enter your username" required />
      <input type="email" id="email" placeholder="Enter your email" required />
      <input type="password" id="password" placeholder="Create a password" required />
      <input type="password" id="confirmPassword" placeholder="Confirm password" required />
      <button type="submit">Sign Up</button>
    </form>

    <p class="login-text">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="js/animations.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
    } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-VEfCLDLCxARSinl8wRBDlpNYyIyDqUg",
      authDomain: "gamehive-86768.firebaseapp.com",
      databaseURL: "https://gamehive-86768-default-rtdb.firebaseio.com",
      projectId: "gamehive-86768",
      storageBucket: "gamehive-86768.appspot.com",  <!-- fixed typo -->
      messagingSenderId: "791019749713",
      appId: "1:791019749713:web:5bd3a751de27994249d370",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    document.getElementById("signupForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Signup successful! Redirecting to login...");
          window.location.href = "login.html";
        })
        .catch((error) => {
          alert("Signup error: " + error.message);
        });
    });
  </script>

</body>
</html>
