<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hive - Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="js/dashboard.js"></script>
    <script src="./2048/script.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #1a2a6c, #b21f1f, #fdbb2d, #23a6d5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatEmoji {
            0% {
                transform: translateY(100vh) scale(1);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        .emoji-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .emoji {
            position: absolute;
            font-size: 2rem;
            animation: floatEmoji linear infinite;
        }

        header, .games-container, .footer {
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 150px;
            height: auto;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .logo-container h1 {
            margin: 10px 0 0;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 2px 2px #000;
        }

        #logoutBtn {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background: #ff4b2b;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            position: right;
            top: 20px;
            right: 20px;
            z-index: 2;
        }

        .welcome {
            text-align: center;
            margin: 30px 0;
        }

        .games-container {
            padding: 20px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            justify-items: center;
            margin-bottom: 40px;
        }

        .bottom-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .game-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            width: 180px;
        }

        .game-card:hover {
            transform: scale(1.05);
        }

        .game-card img {
            width: 100%;
            height: auto;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            width: 100%;
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            margin-top: 50px;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const emojiContainer = document.querySelector(".emoji-container");
            const emojis = ["🎮", "👾", "⭐", "🔥", "🎲", "🕹️"];

            for (let i = 0; i < 30; i++) {
                const emoji = document.createElement("div");
                emoji.classList.add("emoji");
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 100 + "vw";
                emoji.style.animationDuration = (Math.random() * 10 + 5) + "s";
                emoji.style.fontSize = (Math.random() * 20 + 20) + "px";
                emojiContainer.appendChild(emoji);
            }
        });
    </script>
</head>
<body>
    <div class="background"></div> 
    <div class="particles"></div>
    <div class="emoji-container"></div>

    <header>
        <div class="logo-container">
            <img src="assets/gamehive3.jpg" alt="Game Hive Logo" class="logo">
            <h1>GameHive</h1>
        </div>
        <button id="logoutBtn">Logout</button>
    </header>

    <section class="welcome">
        <h2><span>Welcome to GameHive!</span></h2>
        <p>Choose a game and start playing.</p>
    </section>

    <section class="games-container">
        <div class="games-grid">
            <a href="games/sudoku.html" class="game-card">
                <img src="assets/sudoku.jpg" alt="Sudoku">
                <div class="overlay">Play Sudoku</div>
            </a>

            <a href="games/snake.html" class="game-card">
                <img src="assets/snake-games-1.jpeg" alt="Snake">
                <div class="overlay">Play Snake</div>
            </a>

            <a href="games/crossword.html" class="game-card">
                <img src="assets/crossword game.jpg" alt="Crossword">
                <div class="overlay">Play Crossword</div>
            </a>

            <a href="games/wordle.html" class="game-card">
                <img src="assets/wordle-word-game.jpg" alt="Wordle">
                <div class="overlay">Play Wordle</div>
            </a>
        </div>

        <div class="bottom-row">
            <a href="Games/2048game.html" class="game-card">
                <img src="assets/2048.png" alt="2048 Game">
                <div class="overlay">Play 2048</div>
            </a>

            <a href="Games/color.html" class="game-card">
                <img src="assets/colorcatcher.jpg" alt="Color Catcher">
                <div class="overlay">Play Color Catcher</div>
            </a>

            <a href="Games/endless adventure.html" class="game-card">
                <img src="assets/endless adventure.png" alt="Endless Adventure">
                <div class="overlay">Play Endless Adventure</div>
            </a>
        </div>
    </section>

    <footer class="footer">
        <p>You have successfully signed up.</p>
        <p>© 2025 Game Hive | Play, Learn & Enjoy!</p>
    </footer>
</body>
</html>
